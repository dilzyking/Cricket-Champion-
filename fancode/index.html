<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CRICKLY FANCODE LIVE WEB</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Tailwind -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">


<style>
body{
background:#0a0f1c;
font-family:'Poppins',sans-serif;
color:#edf2f7;
}

/* Ensure buttons use same font */
button{
font-family:'Poppins',sans-serif;
}


/* ================= MATCH CARD ================= */

.match-tile{
background:#131d2f;
border-radius:32px;
border:1px solid #253247;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 15px 30px -10px rgba(0,0,0,0.8);
transition:.25s;
}

.match-tile:hover{
background:#17253b;
border-color:#3b82f6;
transform:scale(1.02) translateY(-4px);
box-shadow:0 25px 40px -8px #1e3a8a40;
}


/* ================= IMAGE ================= */

.img-wrapper{
overflow:hidden;
height:210px;
position:relative;
}

.match-img{
width:100%;
height:100%;
object-fit:cover;
}


/* ================= BADGES ================= */

.live-badge{
background:#b91c1c;
color:white;
font-size:12px;
padding:4px 10px;
border-radius:20px;
position:absolute;
top:12px;
left:12px;
animation:liveBlink 1s infinite;
}

@keyframes liveBlink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

.scheduled-badge{
background:rgba(0,0,0,.6);
color:white;
font-size:12px;
padding:4px 10px;
border-radius:20px;
position:absolute;
top:12px;
left:12px;
}


/* ================= WATCH BUTTON ================= */

.watch-btn{
background:#2563eb;
border-radius:50px;
padding:12px;
font-weight:600;
display:flex;
align-items:center;
justify-content:center;
gap:6px;
margin-top:12px;
cursor:pointer;
}

.watch-btn:hover{
background:#1d4ed8;
}

.not-live{
background:#334155;
cursor:not-allowed;
pointer-events:none;
}


/* ================= TELEGRAM POPUP ================= */

.modal{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal.hidden{
display:none!important;
}

.modal-content{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:30px 25px;
width:calc(100% - 40px);
max-width:420px;
margin-left:20px;
margin-right:20px;
text-align:center;
color:#f3f4f6;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
}

.modal-content h2{
font-size:24px;
font-weight:700;
color:#facc15;
margin-bottom:16px;
}

.modal-content p{
font-size:16px;
color:#d1d5db;
margin-bottom:24px;
}


/* ================= TELEGRAM BUTTONS ================= */

.modal-content .btn{
width:100%;
padding:14px;
font-size:16px;
font-weight:600;
border:none;
border-radius:14px;
margin-bottom:12px;
cursor:pointer;
}

#joinButton{
background:linear-gradient(90deg,#3b82f6,#06b6d4);
color:#fff;
}

#closeButton{
background:rgba(255,255,255,0.1);
color:#f3f4f6;
}


/* ================= QUALITY MODAL ================= */

#qualityModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#qualityModal.hidden{
display:none;
}


/* MODAL CARD */

#qualityModal .modal-content{
width:90%;
max-width:360px;
background:#111827;
border-radius:18px;
padding:22px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.7);
}


/* TITLE */

#qualityModal h2{
font-size:20px;
font-weight:600;
margin-bottom:18px;
color:#f9fafb;
}


/* QUALITY LIST */

#qualityList{
display:flex;
flex-direction:column;
gap:10px;
}


/* QUALITY BUTTON */

.quality-item{
background:#1f2937;
border-radius:12px;
padding:14px 16px;
font-size:16px;
font-weight:500;
color:#e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
transition:.2s;
}


/* ARROW ICON */

.quality-item::after{
content:">";
font-size:12px;
opacity:.7;
}


/* HOVER */

.quality-item:hover{
background:#2563eb;
color:white;
transform:translateY(-1px);
}


/* CLOSE BUTTON */

#qualityModal .btn{
margin-top:16px;
background:#ef4444;
color:white;
border:none;
border-radius:10px;
padding:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

#qualityModal .btn:hover{
background:#dc2626;
}
/* DISABLE TEXT SELECTION */

*{
-webkit-user-select:none;
-moz-user-select:none;
-ms-user-select:none;
user-select:none;
}
/* Remove mobile tap highlight */

*{
-webkit-tap-highlight-color: transparent;
}
.match-time{
font-size:13px;
color:#9ca3af;
margin-top:6px;
}
</style>
</head>

<body class="p-5 max-w-7xl mx-auto">

<!-- ================= HEADER ================= -->

<div class="text-center mt-4 mb-8">

<div class="inline-flex items-center justify-center gap-3 bg-[#131d2f] py-3 px-7 rounded-full border border-blue-900/50">

<span class="text-3xl font-black tracking-tight text-white">
CRICKLY
</span>

</div>

<p class="text-gray-500 text-sm mt-3 tracking-wide">
FANCODE LIVE WEB
</p>

</div>

<!-- ================= MATCH GRID ================= -->

<div id="matches-container"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mt-6">
</div>


<!-- ================= QUALITY SELECTION MODAL ================= -->

<div id="qualityModal" class="modal hidden">

<div class="modal-content">

<h2>Select Quality</h2>

<div id="qualityList"></div>

<button onclick="closeQuality()" class="btn">
Close
</button>

</div>

</div>


<!-- TELEGRAM POPUP -->

<div id="telegramModal" class="modal hidden">

<div class="modal-content">

<h2>Join our Telegram</h2>

<p>
Stay updated with the latest
<strong>Live Match Links</strong>
and updates. Click below to join our official Telegram channel.
</p>

<button id="joinButton" class="btn">Join Telegram</button>

<button id="closeButton" class="btn">Already Joined</button>

</div>
</div>


<!-- ================= MAIN SCRIPT ================= -->

<script>
const DATA_URL =
'https://raw.githubusercontent.com/doctor-8trange/zyphx8/refs/heads/main/data/fancode.json';

const PLAYER_URL = 'fcplayer.html?data=';

const container = document.getElementById("matches-container");

let allMatches = [];


/* ================= FETCH MATCH DATA ================= */

fetch(DATA_URL)
.then(res => res.json())
.then(data => {

allMatches = data.matches || [];

container.innerHTML = "";

const matches = allMatches.sort((a,b)=>{

const aLive = (a.status || "").toUpperCase() === "LIVE";
const bLive = (b.status || "").toUpperCase() === "LIVE";

return bLive - aLive;

});


matches.forEach((m,index)=>{

const isLive = (m.status || "").toUpperCase() === "LIVE";

const img =
m.image ||
"https://www.fancode.com/skillup-uploads/cms-media/Cricket_Fallback_Old_match-card.jpg";

const card = document.createElement("div");

card.className = "match-tile";

card.innerHTML = `

<div class="img-wrapper">

<img src="${img}" class="match-img">

${isLive
? '<span class="live-badge"><i class="fas fa-circle"></i> LIVE</span>'
: '<span class="scheduled-badge"><i class="far fa-calendar"></i> SCHEDULED</span>'}

</div>

<div class="p-5 flex flex-col flex-1">

<h3 class="text-xl font-bold">${m.title||'Match'}</h3>

<div class="text-sm text-gray-400 mt-2">${m.tournament||''}</div>

<div class="match-time">
${formatDate(m.startTime)}
</div>

${
isLive
? `<div onclick="openQuality(${index})" class="watch-btn">
<i class="fas fa-play"></i>
WATCH NOW
</div>`
: `<div class="watch-btn not-live">
<i class="far fa-clock"></i>
NOT LIVE
</div>`
}

</div>
`;

container.appendChild(card);

});

})

.catch(()=>{

container.innerHTML =
"<p class='text-center col-span-full'>Failed to load matches</p>";

});

function formatDate(time){

if(!time) return "";

const d = new Date(time);

return d.toLocaleString("en-IN",{
day:"numeric",
month:"short",
hour:"2-digit",
minute:"2-digit"
});

}

/* ================= QUALITY SELECTION ================= */

function openQuality(index){

const match = allMatches[index];

const streamData = match.auto_streams?.[0]?.auto || "";

if(!streamData){

alert("Stream not available");
return;

}

const lines = streamData.split("\n");

let qualities = [];

lines.forEach((line,i)=>{

if(line.includes("RESOLUTION=")){

const resolution =
line.split("RESOLUTION=")[1]
.split(",")[0]
.split("x")[1] + "p";

const streamUrl = lines[i+1].trim();

qualities.push({
res: resolution,
url: streamUrl
});

}

});

if(qualities.length === 0){

alert("No stream qualities found");
return;

}


const list = document.getElementById("qualityList");

list.innerHTML = "";


/* CREATE QUALITY BUTTONS */

qualities.forEach(q=>{

const btn = document.createElement("div");

btn.className = "quality-item";

btn.innerText = q.res;

btn.onclick = function(){

const encoded = btoa(q.url);

window.location.href =
PLAYER_URL + encodeURIComponent(encoded);

};

list.appendChild(btn);

});


document.getElementById("qualityModal").classList.remove("hidden");

}


/* ================= CLOSE MODAL ================= */

function closeQuality(){

document.getElementById("qualityModal").classList.add("hidden");

}
const modal=document.getElementById("telegramModal");

window.addEventListener("load",()=>{
modal.classList.remove("hidden");
});

document.getElementById("joinButton").onclick=function(){
window.open("https://telegram.me/+NSqV0ZHy3flhZmQ1","_blank");
}

document.getElementById("closeButton").onclick=function(){
modal.classList.add("hidden");
}
</script>


<!-- ================= TELEGRAM POPUP SCRIPT ================= -->

<script>

const modal = document.getElementById("telegramModal");

window.addEventListener("load", () => {

if(!sessionStorage.getItem("telegramJoined")){
modal.classList.remove("hidden");
}

});

document.getElementById("joinButton").onclick = function(){

window.open("https://telegram.me/+NSqV0ZHy3flhZmQ1","_blank");

sessionStorage.setItem("telegramJoined","yes");

modal.classList.add("hidden");

};

document.getElementById("closeButton").onclick = function(){

sessionStorage.setItem("telegramJoined","yes");

modal.classList.add("hidden");

};

</script>

</body>
</html>
